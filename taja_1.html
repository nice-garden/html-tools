<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>타자 배틀! +</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #1a0a2e;
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ─── 배경 장식 ─── */
  #bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .bg-deco {
    position: absolute;
    opacity: 0.18;
    animation: floatDeco 6s ease-in-out infinite;
  }
  .bg-deco img { width: 100%; height: 100%; object-fit: contain; }
  @keyframes floatDeco {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  /* ─── 공통 화면 ─── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .screen.hidden { display: none; }

  /* ─── 설정 화면 ─── */
  #setup-screen {
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1060 100%);
  }
  .setup-box {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(180,100,255,0.4);
    border-radius: 20px;
    padding: 40px 50px;
    width: 520px;
    max-width: 95vw;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(150,50,255,0.3);
  }
  .setup-box h1 {
    text-align: center;
    font-size: 2.2rem;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #ff6ec7, #a855f7, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(168,85,247,0.6));
  }
  .setup-box .subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #a78bfa;
    margin-bottom: 28px;
  }
  .setup-section { margin-bottom: 20px; }
  .setup-label {
    font-size: 0.85rem;
    color: #c4b5fd;
    margin-bottom: 8px;
    font-weight: bold;
    letter-spacing: 0.05em;
  }
  .btn-group { display: flex; gap: 10px; }
  .btn-toggle {
    flex: 1;
    padding: 10px;
    border: 2px solid rgba(168,85,247,0.4);
    border-radius: 10px;
    background: transparent;
    color: #c4b5fd;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-toggle:hover { border-color: #a855f7; color: #fff; }
  .btn-toggle.active {
    background: #7c3aed;
    border-color: #a855f7;
    color: #fff;
    box-shadow: 0 0 15px rgba(124,58,237,0.5);
  }
  .speed-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .speed-input-row input {
    width: 90px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 2px solid rgba(168,85,247,0.4);
    background: rgba(0,0,0,0.3);
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
  }
  .speed-input-row input:focus { border-color: #a855f7; }
  .speed-input-row span { color: #a78bfa; font-size: 0.9rem; }
  .measure-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 2px solid rgba(96,165,250,0.5);
    background: rgba(96,165,250,0.1);
    color: #93c5fd;
    cursor: pointer;
    font-size: 0.88rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .measure-btn:hover { background: rgba(96,165,250,0.25); border-color: #60a5fa; color: #fff; }
  .start-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    font-size: 1.15rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.5);
    letter-spacing: 0.05em;
    margin-top: 8px;
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(124,58,237,0.7);
  }

  /* ─── 측정 화면 ─── */
  #measure-screen { background: rgba(10,5,20,0.95); }
  .measure-box {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(96,165,250,0.4);
    border-radius: 20px;
    padding: 36px 44px;
    width: 560px;
    max-width: 95vw;
    backdrop-filter: blur(10px);
  }
  .measure-box h2 { text-align: center; margin-bottom: 6px; color: #93c5fd; font-size: 1.5rem; }
  .measure-box p.desc { text-align: center; color: #94a3b8; font-size: 0.88rem; margin-bottom: 20px; }
  #measure-text-display {
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 1.6rem;
    line-height: 1.7;
    color: #e2e8f0;
    margin-bottom: 14px;
    min-height: 60px;
    letter-spacing: 0.05em;
    text-align: center;
    font-weight: bold;
  }
  #measure-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 2px solid rgba(96,165,250,0.4);
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    margin-bottom: 14px;
  }
  #measure-input:focus { border-color: #60a5fa; }
  .measure-status {
    text-align: center;
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 14px;
    min-height: 1.4em;
  }
  .measure-actions { display: flex; gap: 10px; }
  .measure-actions button {
    flex: 1; padding: 10px; border-radius: 10px; border: 2px solid;
    font-family: inherit; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
  }
  #measure-cancel { border-color: rgba(148,163,184,0.3); background: transparent; color: #94a3b8; }
  #measure-cancel:hover { border-color: #94a3b8; color: #fff; }
  #measure-apply { border-color: rgba(96,165,250,0.5); background: rgba(96,165,250,0.15); color: #93c5fd; }
  #measure-apply:hover { background: rgba(96,165,250,0.3); color: #fff; }
  #measure-apply:disabled { opacity: 0.4; cursor: default; }

  /* ─── 게임 화면 ─── */
  #game-screen {
    flex-direction: column;
    background: linear-gradient(180deg, #0d0520 0%, #1a0a2e 60%, #0f1729 100%);
    padding: 0;
    justify-content: flex-start;
  }

  /* 상단: 몬스터 영역 */
  #monster-zone {
    width: 100%;
    height: 32vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 40px 6px;
    gap: 24px;
    background: linear-gradient(180deg, rgba(80,20,120,0.3) 0%, transparent 100%);
  }
  .avatar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    position: relative;
  }
  #monster-img {
    height: 110px;
    filter: drop-shadow(0 0 20px rgba(255,80,80,0.6));
    image-rendering: pixelated;
  }
  #monster-img.shake { animation: monsterShake 0.15s ease-in-out; }
  @keyframes monsterShake {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-5deg) scale(1.05); }
    75% { transform: rotate(5deg) scale(1.05); }
  }
  .avatar-name {
    font-size: 0.75rem;
    font-weight: bold;
    margin-top: 4px;
    white-space: nowrap;
  }
  .avatar-name.monster { color: #f87171; text-shadow: 0 0 8px rgba(255,80,80,0.7); }
  .avatar-name.player  { color: #93c5fd; }

  /* 라운드 메달 컨테이너 */
  .medal-row {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    min-height: 22px;
    align-items: center;
    justify-content: center;
  }
  .medal {
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    line-height: 1;
  }
  .medal.win {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #451a03;
    box-shadow: 0 0 6px rgba(251,191,36,0.6);
    animation: medalPop 0.35s ease-out;
  }
  .medal.lose {
    background: rgba(100,116,139,0.4);
    color: #64748b;
  }
  .medal.pending {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: transparent;
  }
  @keyframes medalPop {
    0% { transform: scale(0); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* 라운드 결과 플래시 */
  .round-flash {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.1rem;
    font-weight: 900;
    padding: 4px 14px;
    border-radius: 8px;
    white-space: nowrap;
    animation: flashPop 1.6s ease-out forwards;
    pointer-events: none;
    z-index: 22;
  }
  .round-flash.win {
    background: rgba(251,191,36,0.9);
    color: #451a03;
    box-shadow: 0 0 20px rgba(251,191,36,0.7);
  }
  .round-flash.lose {
    background: rgba(100,116,139,0.7);
    color: #e2e8f0;
  }
  @keyframes flashPop {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.5); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.1); }
    30% { transform: translateX(-50%) translateY(0) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-12px); }
  }

  #monster-input-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 680px;
  }
  #monster-bubble {
    background: rgba(160,20,20,0.55);
    border: 2px solid rgba(255,100,100,0.5);
    border-radius: 14px;
    padding: 14px 20px;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    color: #fca5a5;
    min-height: 64px;
    word-break: break-all;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 0 18px rgba(220,50,50,0.2);
  }
  #monster-bubble.visible { opacity: 1; }
  #monster-progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.12);
    border-radius: 3px;
    overflow: hidden;
  }
  #monster-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ef4444, #f97316);
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* 중단: 문제 영역 */
  #word-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 40px;
    position: relative;
  }
  #word-display {
    font-size: 2.6rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-align: center;
    color: #f1f5f9;
    text-shadow: 0 0 20px rgba(168,85,247,0.5);
    line-height: 1.4;
    max-width: 90vw;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  #word-display.long-text { font-size: 1.8rem; letter-spacing: 0.04em; }
  #word-display.very-long-text { font-size: 1.3rem; letter-spacing: 0.02em; }
  /* ─── 키보드 시각화 ─── */
  #kb-visual { display: none; width: 100%; max-width: 700px; }
  #kb-visual.active { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .kb-row-label {
    font-size: 0.7rem; color: #64748b; letter-spacing: 0.05em; margin-bottom: 2px; text-align: center;
  }
  .kb-row {
    display: flex; gap: 4px; justify-content: center;
  }
  .kb-key {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 7px;
    font-size: 0.85rem; font-weight: 600;
    border: 2px solid rgba(100,116,139,0.25);
    background: rgba(30,20,50,0.6);
    color: #64748b;
    transition: all 0.15s;
    position: relative;
  }
  .kb-key.in-row {
    border-color: rgba(168,85,247,0.35);
    color: #a78bfa;
    background: rgba(60,30,100,0.4);
  }
  .kb-key.highlight {
    border-color: #fbbf24;
    color: #fbbf24;
    background: rgba(251,191,36,0.18);
    box-shadow: 0 0 14px rgba(251,191,36,0.4);
    transform: scale(1.12);
    z-index: 2;
  }
  .kb-key.done {
    border-color: rgba(134,239,172,0.4);
    color: #86efac;
    background: rgba(134,239,172,0.1);
  }
  .kb-key .kb-sub {
    position: absolute; top: 2px; right: 4px;
    font-size: 0.5rem; color: #475569; font-weight: normal;
  }
  .kb-finger-guide {
    margin-top: 4px;
    font-size: 0.82rem;
    color: #fbbf24;
    text-align: center;
    min-height: 1.2em;
    text-shadow: 0 0 6px rgba(251,191,36,0.5);
  }

  #word-translation {
    margin-top: 6px;
    font-size: 0.95rem;
    color: #a78bfa;
    text-align: center;
    min-height: 1.3em;
    letter-spacing: 0.03em;
  }
  #word-display .char { transition: color 0.1s; }
  #word-display .char.correct { color: #86efac; }
  #word-display .char.incorrect { color: #f87171; text-decoration: underline; }
  #word-display .char.pending { color: #f1f5f9; }
  #word-display .char.cursor {
    border-left: 3px solid #a855f7;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #player-progress-row {
    width: 100%;
    max-width: 700px;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-label { font-size: 0.8rem; color: #a78bfa; width: 60px; text-align: right; }
  .progress-track {
    flex: 1; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;
  }
  #player-progress-fill {
    height: 100%; background: linear-gradient(90deg, #7c3aed, #a855f7); border-radius: 4px;
    width: 0%; transition: width 0.1s;
  }

  /* 하단: 플레이어 입력 영역 */
  #player-zone {
    width: 100%;
    height: 30vh;
    background: linear-gradient(0deg, rgba(20,10,50,0.9) 0%, transparent 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px 40px 20px;
    gap: 24px;
    position: relative;
  }
  #player-img {
    height: 100px;
    filter: drop-shadow(0 0 12px rgba(100,200,255,0.5));
    image-rendering: pixelated;
  }
  #player-img.type-anim { animation: playerBounce 0.15s ease-out; }
  @keyframes playerBounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  #input-area {
    flex: 1; display: flex; flex-direction: column; gap: 8px; max-width: 680px;
  }
  #target-mirror {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(168,85,247,0.2);
    border-radius: 12px 12px 0 0;
    padding: 12px 20px;
    font-size: 1.2rem;
    letter-spacing: 0.06em;
    color: #94a3b8;
    line-height: 1.6;
    word-break: break-word;
    overflow-wrap: break-word;
    border-bottom: none;
  }
  #target-mirror .m-done { color: #64748b; }
  #target-mirror .m-correct { color: #86efac; }
  #target-mirror .m-incorrect { color: #f87171; font-weight: bold; text-decoration: underline; }
  #target-mirror .m-cursor { color: #fff; font-weight: bold; }
  #target-mirror .m-pending { color: #64748b; }
  #typed-display {
    background: rgba(0,0,0,0.4);
    border: 2px solid rgba(168,85,247,0.4);
    border-radius: 0 0 14px 14px;
    padding: 14px 20px;
    font-size: 1.2rem;
    letter-spacing: 0.06em;
    color: #e2e8f0;
    min-height: 52px;
    word-break: break-all;
    line-height: 1.6;
    border-top: 1px dashed rgba(168,85,247,0.25);
  }
  #typed-display .t-correct { color: #86efac; }
  #typed-display .t-incorrect { color: #f87171; }
  #game-input {
    width: 100%;
    padding: 12px 18px;
    border-radius: 12px;
    border: 2px solid rgba(168,85,247,0.35);
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 1.1rem;
    font-family: inherit;
    outline: none;
    letter-spacing: 0.05em;
    caret-color: #a855f7;
  }
  #game-input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
  #game-input.wrong-lang {
    border-color: #ef4444 !important;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.3) !important;
    animation: wrongLangShake 0.3s ease-out;
  }
  @keyframes wrongLangShake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }
  #lang-badge {
    position: absolute;
    top: -28px;
    right: 0;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: 0.04em;
  }
  #lang-badge.ko { background: rgba(96,165,250,0.2); color: #93c5fd; border: 1px solid rgba(96,165,250,0.4); }
  #lang-badge.en { background: rgba(251,191,36,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.4); }
  #lang-warning {
    position: absolute;
    bottom: -24px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.78rem;
    color: #ef4444;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  #lang-warning.visible { opacity: 1; }

  /* 상태바 */
  #status-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(10,5,20,0.85);
    border-bottom: 1px solid rgba(168,85,247,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 20;
    backdrop-filter: blur(10px);
  }
  .status-item { font-size: 0.85rem; color: #a78bfa; }
  .status-item span { color: #f1f5f9; font-weight: bold; margin-left: 4px; }
  #score-display {
    font-size: 0.9rem;
    color: #c4b5fd;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #score-display .s-player { color: #93c5fd; }
  #score-display .s-monster { color: #f87171; }
  #score-display .s-vs { color: #64748b; font-size: 0.8rem; }

  /* ─── 결과 오버레이 (최종 결과만) ─── */
  #result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,2,15,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    backdrop-filter: blur(6px);
  }
  #result-overlay.hidden { display: none; }
  .result-box {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(168,85,247,0.5);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    min-width: 380px;
  }
  .result-box h2 { font-size: 2.2rem; margin-bottom: 6px; }
  .result-box .result-msg { color: #a78bfa; margin-bottom: 24px; font-size: 1rem; }
  .final-score-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .final-score-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .final-score-side img { height: 70px; image-rendering: pixelated; }
  .final-score-side .fs-name { font-size: 0.8rem; color: #94a3b8; }
  .final-score-side .fs-val { font-size: 2.8rem; font-weight: 900; }
  .final-score-side .fs-val.player-c { color: #93c5fd; }
  .final-score-side .fs-val.monster-c { color: #f87171; }
  .final-score-vs {
    font-size: 1.5rem;
    font-weight: 900;
    color: #f59e0b;
    text-shadow: 0 0 10px rgba(245,158,11,0.5);
  }
  .final-medal-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .final-medal {

  .speed-chip {
    display: flex;

    padding: 6px 12px;
    min-width: 56px;

  .speed-chip .sc-unit { font-size: 0.6rem; color: #64748b; }
  .speed-chip.win { border: 1px solid rgba(251,191,36,0.4); }
  .speed-chip.lose { border: 1px solid rgba(100,116,139,0.2); }

    text-align: center;
    margin-bottom: 16px;

    margin-bottom: 16px;

    margin-bottom: 6px;

    display: flex;

    gap: 3px;

    align-items: center;

    border-radius: 6px;
    font-size: 0.82rem;

  .ranking-row .rk-pos.gold { color: #fbbf24; }
  .ranking-row .rk-pos.silver { color: #94a3b8; }
  .ranking-row .rk-pos.bronze { color: #cd7f32; }
  .ranking-row .rk-speed { color: #e2e8f0; font-weight: bold; }
  .ranking-row .rk-date { color: #64748b; font-size: 0.72rem; }
  .ranking-row .rk-result { font-size: 0.72rem; margin-left: 6px; }

  .result-actions { display: flex; gap: 12px; justify-content: center; }

    padding: 11px 28px; border-radius: 10px; border: 2px solid;
    font-family: inherit; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;

  #btn-restart {
    border-color: rgba(168,85,247,0.6);
    background: rgba(124,58,237,0.3);
    color: #c4b5fd;
  }
  #btn-restart:hover { background: #7c3aed; color: #fff; }
  #btn-quit {
    border-color: rgba(148,163,184,0.3);
    background: transparent;
    color: #94a3b8;

  /* ─── 콤보 디스플레이 ─── */
  #combo-display {
    font-size: 0.82rem;
    font-weight: bold;
    color: #fb923c;
    text-shadow: 0 0 8px rgba(251,146,60,0.7);
    min-width: 80px;
    text-align: center;
    transition: opacity 0.3s;
  }
  #combo-display.hidden { opacity: 0; }
  #combo-display.pop { animation: comboPop 0.25s ease-out; }

    0%  { transform: scale(1); }
    50% { transform: scale(1.35); }
    100%{ transform: scale(1); }
  }

  /* ─── 정확도 표시 ─── */
  #accuracy-display { font-size: 0.82rem; color: #a78bfa; }

  /* ─── 오타 플래시 ─── */
  @keyframes inputErrorFlash {
    0%,100% { border-color: rgba(168,85,247,0.35); box-shadow: none; }

  @media (max-width: 480px) {

    font-size: 0.62rem;
    font-weight: bold;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  /* 파티클 */
  .particle {
    position: fixed; width: 6px; height: 6px; border-radius: 50%;
    pointer-events: none; z-index: 25;
    animation: particleFall 0.8s ease-out forwards;
  }
  @keyframes particleFall {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  .popup-msg {
    position: fixed; top: 55px; left: 50%; transform: translateX(-50%);
    background: rgba(124,58,237,0.9); color: #fff; padding: 8px 20px;

  }
  @keyframes fadeUpOut {
    0% { opacity:1; transform: translateX(-50%) translateY(0); }
    60% { opacity:1; transform: translateX(-50%) translateY(-4px); }
    100% { opacity:0; transform: translateX(-50%) translateY(-16px); }
  }

  /* ─── 카운트다운 오버레이 (딤 처리) ─── */
  #countdown-overlay {
    position: fixed; inset: 0; display: flex; align-items: center;
    justify-content: center; z-index: 28; pointer-events: none;
    background: rgba(0,0,0,0.7);
    transition: opacity 0.4s ease-out;
  }
  #countdown-overlay.hidden { display: none; }
  #countdown-overlay.fade-out {
    opacity: 0;
  }
  #countdown-number {
    font-size: 10rem; font-weight: 900; color: #fff;
    text-shadow: 0 0 60px rgba(168,85,247,0.9), 0 0 120px rgba(168,85,247,0.4);
    line-height: 1;
  }
  #countdown-number.pulse {
    animation: countPulse 0.85s ease-out forwards;
  }
  #countdown-number.go {
    color: #86efac;
    font-size: 7rem;
    text-shadow: 0 0 60px rgba(134,239,172,0.9), 0 0 120px rgba(134,239,172,0.4);
  }
  @keyframes countPulse {
    0%   { transform: scale(1.8); opacity: 0; }
    20%  { transform: scale(1.0); opacity: 1; }
    80%  { transform: scale(1.0); opacity: 1; }
    100% { transform: scale(0.8); opacity: 0.3; }
  }

<div id="bg-layer"></div>

<!-- ─── 설정 화면 ─── -->
<div id="setup-screen" class="screen">
  <div class="setup-box">
    <h1>타자 배틀 <span style="font-size:1.2rem;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">+</span></h1>
    <p class="subtitle">몬스터보다 빠르게 타이핑해서 승리하라!</p>

    <div class="setup-section">
      <div class="setup-label">🌐 언어</div>
      <div class="btn-group">
        <button class="btn-toggle active" data-lang="ko" onclick="selectLang('ko')">한글</button>
        <button class="btn-toggle" data-lang="en" onclick="selectLang('en')">English</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label">📝 문제 유형</div>
      <div class="btn-group">
        <button class="btn-toggle active" data-mode="word" onclick="selectMode('word')">단어</button>
        <button class="btn-toggle" data-mode="sentence" onclick="selectMode('sentence')">문장</button>
      </div>
      <div class="btn-group" style="margin-top:8px;">
        <button class="btn-toggle" data-mode="top_row" onclick="selectMode('top_row')">윗줄</button>
        <button class="btn-toggle" data-mode="mid_row" onclick="selectMode('mid_row')">가운데줄</button>
        <button class="btn-toggle" data-mode="bot_row" onclick="selectMode('bot_row')">아랫줄</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label">⚡ 내 타이핑 속도 (타/분)</div>
      <div class="speed-input-row">
        <input type="text" id="speed-input" value="200" placeholder="타/분" autocomplete="off">
        <span>타/분</span>
        <button class="measure-btn" onclick="openMeasure()">🔬 측정하기</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label">👾 몬스터 속도</div>
      <div class="btn-group">
        <button class="btn-toggle" data-diff="much_slower" onclick="selectDiff('much_slower')">많이 느리게</button>
        <button class="btn-toggle active" data-diff="slower" onclick="selectDiff('slower')">약간 느리게</button>
        <button class="btn-toggle" data-diff="faster" onclick="selectDiff('faster')">약간 빠르게</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label">🎯 라운드 수</div>
      <div class="btn-group">
        <button class="btn-toggle" data-rounds="3" onclick="selectRounds(3)">3라운드</button>
        <button class="btn-toggle active" data-rounds="5" onclick="selectRounds(5)">5라운드</button>
        <button class="btn-toggle" data-rounds="10" onclick="selectRounds(10)">10라운드</button>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">배틀 시작!</button>
  </div>
</div>

<!-- ─── 측정 화면 ─── -->
<div id="measure-screen" class="screen hidden">
  <div class="measure-box">
    <h2>타이핑 속도 측정</h2>
    <p class="desc" id="measure-desc">아래 텍스트를 그대로 입력하세요.</p>

    <input type="text" id="measure-input" placeholder="여기에 입력하세요..." autocomplete="off" spellcheck="false">

    <div class="measure-actions">
      <button id="measure-cancel" onclick="closeMeasure()">취소</button>
      <button id="measure-apply" disabled onclick="applyMeasuredSpeed()">적용하기</button>
    </div>
  </div>
</div>

<!-- ─── 게임 화면 ─── -->
<div id="game-screen" class="screen hidden">

      <div class="kb-row" id="kb-row-top"></div>

      <div class="kb-row" id="kb-row-bot"></div>
      <div class="kb-finger-guide" id="kb-finger-guide"></div>
    </div>
    <div id="word-display"></div>
    <div id="word-translation"></div>
    <div id="player-progress-row">
      <div class="progress-label">나</div>
      <div class="progress-track"><div id="player-progress-fill"></div></div>
    </div>
  </div>

  <!-- 플레이어 영역 -->

      <div style="position:relative;">
        <div id="lang-badge"></div>

        <div id="lang-warning"></div>
      </div>
    </div>
  </div>
</div>

<!-- ─── 최종 결과 오버레이 ─── -->
<div id="result-overlay" class="hidden">

    <p class="result-msg" id="result-msg"></p>
    <div class="final-score-row">
      <div class="final-score-side">

        <div class="fs-name">YOU</div>
        <div class="fs-val player-c" id="fs-player">0</div>

    <div id="ranking-section"></div>

    <div class="result-actions">

    </div>
  </div>
</div>

const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

function buildSyllable(con, vow) {
  const ci = CHO.indexOf(con);
  const vi = JUNG.indexOf(vow);
  if (ci < 0 || vi < 0) return null;
  return String.fromCharCode(0xAC00 + ci * 21 * 28 + vi * 28);
}

function renderKeyboard(activeMode) {
  const kbVisual = document.getElementById('kb-visual');
  if (!isKbRowMode()) { kbVisual.classList.remove('active'); return; }
  kbVisual.classList.add('active');

  const activeRowId = { top_row:'top', mid_row:'mid', bot_row:'bot' }[activeMode];
  const isKo = cfg.lang === 'ko';

  KB_LAYOUT.forEach(row => {
    const el = document.getElementById('kb-row-' + row.id);
    let html = '';
    for (let i = 0; i < row.keys.length; i++) {
      const enKey = row.keys[i];
      const koKey = row.ko[i] || '';
      const inRow = row.id === activeRowId;
      const label = isKo ? koKey : enKey;
      const sub = isKo ? enKey : '';
      html += `<div class="kb-key ${inRow?'in-row':''}" data-en="${enKey}" data-ko="${koKey}">`;
      html += label;
      if (sub) html += `<span class="kb-sub">${sub}</span>`;
      html += '</div>';
    }
    el.innerHTML = html;
  });
  document.getElementById('kb-finger-guide').textContent = '';
}

function highlightKey(char) {
  // 기존 하이라이트 제거
  document.querySelectorAll('.kb-key.highlight').forEach(k => k.classList.remove('highlight'));
  const guide = document.getElementById('kb-finger-guide');

  if (!char) { guide.textContent = ''; return; }

  const isKo = cfg.lang === 'ko';
  let targetEnKey = '';

  if (isKo) {
    // 한글 음절을 초성/중성으로 분해하여 다음에 칠 자모 찾기
    const code = char.charCodeAt(0);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const offset = code - 0xAC00;
      const choIdx = Math.floor(offset / (21 * 28));
      const jungIdx = Math.floor((offset % (21 * 28)) / 28);
      const choJamo = CHO[choIdx];
      const jungJamo = JUNG[jungIdx];
      // 초성 키 하이라이트
      if (JAMO_TO_KEY[choJamo]) {
        targetEnKey = JAMO_TO_KEY[choJamo].key;
        highlightSingleKey(targetEnKey);
      }
      // 중성도 서브 하이라이트 (두번째로 눌러야 할 키)
      if (JAMO_TO_KEY[jungJamo]) {
        const vowelKey = JAMO_TO_KEY[jungJamo].key;
        const vowelEl = document.querySelector(`.kb-key[data-en="${vowelKey}"]`);
        if (vowelEl) vowelEl.classList.add('highlight');
        guide.textContent = `${FINGER_GUIDE[targetEnKey]||''} → ${choJamo}  +  ${FINGER_GUIDE[vowelKey]||''} → ${jungJamo}`;
        return;
      }
      guide.textContent = FINGER_GUIDE[targetEnKey] ? `${FINGER_GUIDE[targetEnKey]} → ${choJamo}` : '';
      return;
    }
    // 자모 단독
    if (JAMO_TO_KEY[char]) {
      targetEnKey = JAMO_TO_KEY[char].key;
    }
  } else {
    targetEnKey = char.toLowerCase();
  }

  if (targetEnKey) {
    highlightSingleKey(targetEnKey);
    guide.textContent = FINGER_GUIDE[targetEnKey] ? `${FINGER_GUIDE[targetEnKey]} 손가락` : '';
  } else {
    guide.textContent = '';
  }
}

function highlightSingleKey(enKey) {
  const el = document.querySelector(`.kb-key[data-en="${enKey}"]`);
  if (el) el.classList.add('highlight');
}

function markKeyDone(char) {
  const isKo = cfg.lang === 'ko';
  let enKey = '';
  if (isKo && JAMO_TO_KEY[char]) {
    enKey = JAMO_TO_KEY[char].key;
  } else if (!isKo) {
    enKey = char.toLowerCase();
  }
  // 음절인 경우 초성/중성 모두 done 처리
  if (isKo) {
    const code = char.charCodeAt(0);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const offset = code - 0xAC00;
      const choJamo = CHO[Math.floor(offset / (21 * 28))];
      const jungJamo = JUNG[Math.floor((offset % (21 * 28)) / 28)];
      [choJamo, jungJamo].forEach(j => {
        if (JAMO_TO_KEY[j]) {
          const el = document.querySelector(`.kb-key[data-en="${JAMO_TO_KEY[j].key}"]`);
          if (el) { el.classList.add('done'); setTimeout(() => el.classList.remove('done'), 400); }
        }
      });
      return;
    }
  }
  if (enKey) {
    const el = document.querySelector(`.kb-key[data-en="${enKey}"]`);
    if (el) { el.classList.add('done'); setTimeout(() => el.classList.remove('done'), 400); }
  }
}

function generateKbWord(mode, lang, len) {
  const row = KB_ROWS[mode];
  if (!row) return 'test';
  if (lang === 'en') {
    const chars = row.en;
    let w = '';
    for (let i = 0; i < len; i++) w += chars[Math.floor(Math.random() * chars.length)];
    return w;
  } else {
    // 한글: 초성+중성 조합으로 음절 생성
    let w = '';
    const targetSyl = Math.max(2, Math.ceil(len / 2));
    for (let i = 0; i < targetSyl; i++) {
      const c = row.ko_con[Math.floor(Math.random() * row.ko_con.length)];
      const v = row.ko_vow[Math.floor(Math.random() * row.ko_vow.length)];
      const syl = buildSyllable(c, v);
      if (syl) w += syl; else w += c + v;
    }
    return w;
  }
}

// ─── Web Audio API (효과음) ───
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playSound(freq, type, duration, volume=0.18, startFreq=null) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    if (startFreq) {
      osc.frequency.setValueAtTime(startFreq, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(freq, ctx.currentTime + duration);
    } else {
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
    }
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  const mi = document.getElementById('measure-input');
  let measureComposing = false;
  mi.addEventListener('compositionstart', () => { measureComposing = true; });
  mi.addEventListener('compositionend', () => { measureComposing = false; checkMeasure(mi); });
  mi.addEventListener('input', () => checkMeasure(mi));

  function checkMeasure(el) {
    const val = el.value;
    const target = measureState.targetText;
    if (!measureState.started && val.length > 0) {
      measureState.started = true;
      measureState.startTime = Date.now();
    }
    if (measureState.started) {
      const elapsed = (Date.now() - measureState.startTime) / 1000 / 60;
      const wpm = elapsed > 0 ? Math.round(val.length / elapsed) : 0;
      document.getElementById('measure-status').textContent = `${wpm} 타/분`;
    }
    if (measureComposing) return;
    // 단어/키보드줄 모드: 공백 입력이나 완전 일치
    if (cfg.mode === 'word' || isKbRowMode()) {
      const trimmed = val.trim();
      if (trimmed === target && (val === target || val.endsWith(' '))) {
        finishMeasure(target);
      }
    } else {
      if (val === target) finishMeasure(target);
    }
  }
  function finishMeasure(target) {
    const elapsed = (Date.now() - measureState.startTime) / 1000 / 60;
    const speed = Math.round(target.length / elapsed);
    measureState.measuredSpeed = speed;
    document.getElementById('measure-status').textContent = `완료! ${speed} 타/분`;
    document.getElementById('measure-apply').disabled = false;
    document.getElementById('measure-input').disabled = true;

});

function isKbRowMode() {
  return cfg.mode === 'top_row' || cfg.mode === 'mid_row' || cfg.mode === 'bot_row';
}
function getRawPool() {
  if (cfg.mode === 'word') return cfg.lang === 'ko' ? WORDS_KO : WORDS_EN;
  if (cfg.mode === 'sentence') return cfg.lang === 'ko' ? SENTENCES_KO : SENTENCES_EN;
  return []; // 키보드 줄 모드는 동적 생성
}
function shufflePool() {
  if (isKbRowMode()) {
    gameState.shuffledPool = [];
    gameState.poolIndex = 0;
    return;
  }
  const raw = getRawPool();
  const arr = [...raw].sort(() => Math.random() - 0.5);
  gameState.shuffledPool = arr;
  gameState.poolIndex = 0;
}
function pickWord() {
  // 키보드 줄 모드: 동적 생성
  if (isKbRowMode()) {
    const len = 4 + Math.floor(Math.random() * 4); // 4~7글자
    gameState.currentTranslation = '';
    return generateKbWord(cfg.mode, cfg.lang, len);
  }
  if (gameState.poolIndex >= gameState.shuffledPool.length) {
    shufflePool();
  }
  const item = gameState.shuffledPool[gameState.poolIndex++];
  if (Array.isArray(item)) {
    gameState.currentTranslation = item[1];
    return item[0];
  }
  gameState.currentTranslation = '';
  return item;
}

function renderMedals() {
  const total = cfg.totalRounds;
  const results = gameState.roundResults;
  let pHtml = '', mHtml = '';
  for (let i = 0; i < total; i++) {
    if (i < results.length) {
      const r = results[i];
      pHtml += `<div class="medal ${r==='player'?'win':'lose'}">${r==='player'?'W':'L'}</div>`;
      mHtml += `<div class="medal ${r==='monster'?'win':'lose'}">${r==='monster'?'W':'L'}</div>`;
    } else {
      pHtml += '<div class="medal pending"></div>';
      mHtml += '<div class="medal pending"></div>';
    }
  }
  document.getElementById('player-medals').innerHTML = pHtml;
  document.getElementById('monster-medals').innerHTML = mHtml;
  document.getElementById('score-player').textContent = gameState.playerScore;
  document.getElementById('score-monster').textContent = gameState.monsterScore;
}

function startRound() {
  if (gameState.autoAdvanceTimer) { clearTimeout(gameState.autoAdvanceTimer); gameState.autoAdvanceTimer = null; }
  gameState.currentWord = pickWord();
  gameState.playerTyped = '';
  gameState.playerDone = false;
  gameState.monsterDone = false;
  gameState.monsterPos = 0;
  gameState.playerStartTime = null;
  gameState.myActualSpeed = 0;
  gameState.roundOver = false;

  const playerCharsPerSec = cfg.mySpeed / 60;
  gameState.monsterSpeed = playerCharsPerSec * getMonsterSpeedRatio();

  document.getElementById('stat-round').textContent = `${gameState.round}/${cfg.totalRounds}`;
  document.getElementById('stat-my-speed').textContent = cfg.mySpeed;

  renderKeyboard(cfg.mode);
  updateLangBadge();
  renderWordDisplay();
  renderTypedDisplay();
  updateMonsterDisplay();
  document.getElementById('monster-progress-fill').style.width = '0%';
  document.getElementById('player-progress-fill').style.width = '0%';

  // 이전 라운드 플래시 제거
  document.querySelectorAll('.round-flash').forEach(e => e.remove());

  const inp = document.getElementById('game-input');
  inp.value = '';
  inp.disabled = true; // 카운트다운 중 입력 차단
  let countdown = 3;
  showCountdown(countdown);
  const cdi = setInterval(() => {
    countdown--;
    if (countdown > 0) {
      showCountdown(countdown);
    } else {
      clearInterval(cdi);
      // "시작!" 표시
      showCountdown(0);
      // 0.7초 후 딤 해제 → 화면 밝아짐
      setTimeout(() => {
        fadeOutCountdown(() => {
          // 밝아진 후 입력 활성화 + 몬스터 시작
          inp.disabled = false;
          inp.focus();
          startMonster();
        });
      }, 700);
    }
  }, 1000);
}

function startMonster() {
  if (gameState.monsterInterval) clearInterval(gameState.monsterInterval);
  if (gameState.monsterDelay) clearTimeout(gameState.monsterDelay);
  const word = gameState.currentWord;
  const msPerChar = (1 / gameState.monsterSpeed) * 1000;
  // 사람이 문제를 읽고 반응하는 시간만큼 몬스터도 딜레이
  gameState.monsterDelay = setTimeout(() => {
  gameState.monsterInterval = setInterval(() => {
    if (gameState.roundOver) { clearInterval(gameState.monsterInterval); return; }
    if (gameState.monsterPos < word.length) {
      gameState.monsterPos++;
      updateMonsterDisplay();
      animateMonster();
      if (gameState.monsterPos >= word.length) {
        clearInterval(gameState.monsterInterval);
        gameState.monsterDone = true;
        endRound('monster');
      }
    }
  }, msPerChar);
  }, 200); // 0.2초 딜레이
}

function updateMonsterDisplay() {

  const pos = gameState.monsterPos;
  const pct = word.length > 0 ? (pos / word.length) * 100 : 0;
  document.getElementById('monster-progress-fill').style.width = pct + '%';

    bubble.classList.add('visible');
  } else if (pos > 0) {
    bubble.textContent = word.slice(0, pos);
    bubble.classList.add('visible');
  } else {
    bubble.textContent = '';
    bubble.classList.remove('visible');
  }
}

  img.classList.remove('shake');

let isComposing = false;
document.addEventListener('DOMContentLoaded', () => {
  const gi = document.getElementById('game-input');
  gi.addEventListener('compositionstart', () => { isComposing = true; });
  gi.addEventListener('compositionend', () => { isComposing = false; onPlayerInput({ target: gi }); });

      const val = gi.value;

        gi.value = '';
        finishPlayerTyping(val);
      }
    }
  });
});

function isKoreanChar(ch) { return /[가-힣ㄱ-ㅎㅏ-ㅣ]/.test(ch); }
function isEnglishChar(ch) { return /[a-zA-Z]/.test(ch); }

function checkLangMismatch(val) {
  const input = document.getElementById('game-input');
  const warning = document.getElementById('lang-warning');
  if (!val || val.length === 0) {
    input.classList.remove('wrong-lang');
    warning.classList.remove('visible');
    return;
  }
  const lastChar = val[val.length - 1];
  let mismatch = false;
  if (cfg.lang === 'ko' && isEnglishChar(lastChar)) {
    mismatch = true;
    warning.textContent = '⚠ 한/영 키를 눌러 한글로 전환하세요!';
  } else if (cfg.lang === 'en' && isKoreanChar(lastChar)) {
    mismatch = true;
    warning.textContent = '⚠ Press 한/영 to switch to English!';
  }
  if (mismatch) {
    input.classList.add('wrong-lang');
    warning.classList.add('visible');
    // 잘못된 입력 자동 삭제
    const corrected = val.slice(0, -1);
    input.value = corrected;
    gameState.playerTyped = corrected;
    // 잠시 후 경고 숨김
    clearTimeout(checkLangMismatch._timer);
    checkLangMismatch._timer = setTimeout(() => {
      input.classList.remove('wrong-lang');
      warning.classList.remove('visible');
    }, 2000);
    return true; // mismatch detected
  }
  input.classList.remove('wrong-lang');
  warning.classList.remove('visible');
  return false;
}

function updateLangBadge() {
  const badge = document.getElementById('lang-badge');
  if (cfg.lang === 'ko') {
    badge.textContent = '한글';
    badge.className = 'ko';
  } else {
    badge.textContent = 'ENG';
    badge.className = 'en';
  }
}

function onPlayerInput(e) {
  if (gameState.roundOver) return;
  const val = e.target.value;
  // 언어 불일치 감지 (조합 중이 아닐 때만)
  if (!isComposing && checkLangMismatch(val)) {
    renderWordDisplay();
    renderTypedDisplay();
    return;
  }
  const word = gameState.currentWord;
  // v2: 키입력 사운드 + 정확도 추적 (조합 중 제외)
  if (!isComposing && val.length > gameState.playerTyped.length) {
    const newIdx = val.length - 1;
    gameState.totalCharsTyped++;
    if (newIdx < word.length && val[newIdx] === word[newIdx]) {
      gameState.correctCharsTyped++;
    } else {
      const inp = document.getElementById('game-input');
      inp.classList.remove('input-error');
      void inp.offsetWidth;
      inp.classList.add('input-error');
    }
    soundKeystroke();
    updateAccuracyDisplay();
  }
  if (!gameState.playerStartTime && val.length > 0) gameState.playerStartTime = Date.now();
  gameState.playerTyped = val;
  renderWordDisplay();
  renderTypedDisplay();
  const correctLen = getCorrectPrefixLen(val, word);
  document.getElementById('player-progress-fill').style.width = (correctLen / word.length * 100) + '%';
  animatePlayer();
  if (isComposing) return;
  if (cfg.mode === 'word' || isKbRowMode()) {
    if (val === word || (val.endsWith(' ') && val.trim() === word)) {
      e.target.value = '';
      finishPlayerTyping(word);
    }
  } else {
    if (val === word) { e.target.value = ''; finishPlayerTyping(word); }
  }
}
function getCorrectPrefixLen(typed, target) {
  let i = 0;
  while (i < typed.length && i < target.length && typed[i] === target[i]) i++;
  return i;
}
function finishPlayerTyping(typed) {
  if (gameState.playerDone || gameState.roundOver) return;
  const elapsed = gameState.playerStartTime ? (Date.now() - gameState.playerStartTime) / 1000 / 60 : 0;
  gameState.myActualSpeed = elapsed > 0 ? Math.round(typed.length / elapsed) : cfg.mySpeed;
  gameState.playerDone = true;
  gameState.playerTyped = typed;
  renderWordDisplay();
  renderTypedDisplay();
  document.getElementById('player-progress-fill').style.width = '100%';
  spawnParticles();
  // v2: 콤보 증가 + 사운드
  gameState.comboCount++;
  if (gameState.comboCount > gameState.maxCombo) gameState.maxCombo = gameState.comboCount;
  soundWordComplete();
  if ([5, 10, 20].includes(gameState.comboCount)) soundComboMile();
  updateComboDisplay();
  if (!gameState.monsterDone) endRound('player');
}
function animatePlayer() {
  const img = document.getElementById('player-img');
  img.classList.remove('type-anim');
  void img.offsetWidth;
  img.classList.add('type-anim');
}

function renderWordDisplay() {
  const word = gameState.currentWord;
  const typed = gameState.playerTyped;
  const el = document.getElementById('word-display');
  // 글자 수에 따라 폰트 크기 조절
  el.classList.remove('long-text', 'very-long-text');
  if (word.length > 35) el.classList.add('very-long-text');
  else if (word.length > 18) el.classList.add('long-text');

  let html = '';
  for (let i = 0; i < word.length; i++) {
    let cls = 'pending';
    if (i < typed.length) cls = typed[i] === word[i] ? 'correct' : 'incorrect';
    else if (i === typed.length) cls = 'cursor';
    html += `<span class="char ${cls}">${word[i] === ' ' ? '&nbsp;' : escHtml(word[i])}</span>`;
  }
  el.innerHTML = html;

  // 영어 모드 번역 표시
  const transEl = document.getElementById('word-translation');
  transEl.textContent = gameState.currentTranslation || '';

  // 입력 영역 바로 위 미러: 대상 문장 + 입력 진행 상태
  let mirrorHtml = '';
  for (let i = 0; i < word.length; i++) {
    let cls = 'm-pending';
    if (i < typed.length) cls = typed[i] === word[i] ? 'm-correct' : 'm-incorrect';
    else if (i === typed.length) cls = 'm-cursor';
    mirrorHtml += `<span class="${cls}">${word[i] === ' ' ? '&nbsp;' : escHtml(word[i])}</span>`;
  }
  document.getElementById('target-mirror').innerHTML = mirrorHtml;

  // 키보드 줄 모드: 다음에 쳐야 할 키 하이라이트
  if (isKbRowMode()) {
    const nextIdx = typed.length;
    if (nextIdx < word.length) {
      highlightKey(word[nextIdx]);
    } else {
      highlightKey(null);
    }
    // 방금 입력한 글자에 done 효과
    if (typed.length > 0) {
      markKeyDone(typed[typed.length - 1]);
    }
  }
}
function renderTypedDisplay() {
  const word = gameState.currentWord;
  const typed = gameState.playerTyped;
  let html = '';
  for (let i = 0; i < typed.length; i++) {
    const ok = i < word.length && typed[i] === word[i];
    html += `<span class="${ok?'t-correct':'t-incorrect'}">${typed[i]===' '?'&nbsp;':escHtml(typed[i])}</span>`;
  }
  document.getElementById('typed-display').innerHTML = html || '<span style="color:#4a5568">' + (cfg.lang==='ko'?'입력 대기 중...':'Waiting...') + '</span>';
}
function escHtml(c) { return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── 라운드 종료 ───
function endRound(winner) {
  if (gameState.roundOver) return;
  gameState.roundOver = true;
  if (gameState.monsterInterval) clearInterval(gameState.monsterInterval);
  document.getElementById('game-input').disabled = true;

  const playerWon = winner === 'player';
  if (playerWon) gameState.playerScore++;
  else gameState.monsterScore++;
  gameState.roundResults.push(winner);
  gameState.roundSpeeds.push(gameState.myActualSpeed || 0);
  // v2: 라운드 결과 사운드 + 콤보 처리
  if (playerWon) {
    soundRoundWin();
  } else {
    soundRoundLose();
    gameState.comboCount = 0;
    updateComboDisplay();
  }
  renderMedals();

  // 승자 영역에 플래시 표시
  showRoundFlash(playerWon);

  const isLast = gameState.round >= cfg.totalRounds;
  if (isLast) {
    // 최종 라운드 → 잠시 후 최종 결과 모달
    gameState.autoAdvanceTimer = setTimeout(() => showFinalResult(), 2000);
  } else {
    // 다음 라운드 자동 진행
    gameState.autoAdvanceTimer = setTimeout(() => {
      gameState.round++;
      startRound();
    }, 2000);
  }
}

function showRoundFlash(playerWon) {
  // 기존 플래시 제거
  document.querySelectorAll('.round-flash').forEach(e => e.remove());

  const winnerCol = playerWon ? document.getElementById('player-avatar-col') : document.getElementById('monster-avatar-col');
  const loserCol = playerWon ? document.getElementById('monster-avatar-col') : document.getElementById('player-avatar-col');

  const wf = document.createElement('div');
  wf.className = 'round-flash win';
  wf.textContent = 'WIN!';
  winnerCol.appendChild(wf);

  const lf = document.createElement('div');
  lf.className = 'round-flash lose';
  lf.textContent = 'LOSE';
  loserCol.appendChild(lf);

  setTimeout(() => { wf.remove(); lf.remove(); }, 1800);
}

function showFinalResult() {
  const pw = gameState.playerScore;
  const mw = gameState.monsterScore;
  const title = document.getElementById('result-title');
  const msg = document.getElementById('result-msg');

  if (pw > mw) {
    title.textContent = '최종 승리!';
    title.style.color = '#fbbf24';
    msg.textContent = `${cfg.totalRounds}라운드를 마치고 몬스터를 물리쳤습니다!`;
  } else if (pw === mw) {
    title.textContent = '무승부!';
    title.style.color = '#94a3b8';
    msg.textContent = `${cfg.totalRounds}라운드를 마쳤지만 승부를 가리지 못했습니다.`;
  } else {
    title.textContent = '최종 패배...';
    title.style.color = '#f87171';
    msg.textContent = `${cfg.totalRounds}라운드를 마쳤지만 몬스터에게 졌습니다.`;
  }

  document.getElementById('fs-player').textContent = pw;
  document.getElementById('fs-monster').textContent = mw;

  // 라운드별 메달 표시
  let medalHtml = '';
  gameState.roundResults.forEach(r => {
    medalHtml += `<div class="final-medal ${r==='player'?'win':'lose'}">${r==='player'?'W':'L'}</div>`;
  });
  document.getElementById('final-medals').innerHTML = medalHtml;

  // 라운드별 속도 칩
  let chipHtml = '';
  gameState.roundSpeeds.forEach((spd, i) => {
    const won = gameState.roundResults[i] === 'player';
    chipHtml += `<div class="speed-chip ${won?'win':'lose'}">
      <span class="sc-round">R${i+1}</span>
      <span class="sc-val">${spd || '-'}</span>
      <span class="sc-unit">타/분</span>
    </div>`;
  });
  document.getElementById('round-speed-table').innerHTML = chipHtml;

  // 평균 속도
  const validSpeeds = gameState.roundSpeeds.filter(s => s > 0);
  const avgSpeed = validSpeeds.length > 0 ? Math.round(validSpeeds.reduce((a,b)=>a+b,0) / validSpeeds.length) : 0;
  document.getElementById('avg-speed-display').innerHTML = avgSpeed > 0
    ? `평균 타이핑 속도: <span>${avgSpeed}</span> 타/분`
    : '';

  // v2: 최고 콤보 + 전체 정확도
  const overallAcc = gameState.totalCharsTyped > 0
    ? Math.round(gameState.correctCharsTyped / gameState.totalCharsTyped * 100)
    : 100;
  if (gameState.maxCombo > 0 || gameState.totalCharsTyped > 0) {
    document.getElementById('avg-speed-display').innerHTML +=
      `<br><span style="font-size:0.85rem;color:#a78bfa">` +
      `최고 콤보 <span style="color:#fb923c;font-weight:bold">${gameState.maxCombo}콤보</span>` +
      ` &nbsp;·&nbsp; 정확도 <span style="color:#86efac;font-weight:bold">${overallAcc}%</span></span>`;
  }

  // 랭킹 저장 + 표시
  if (avgSpeed > 0) saveRanking(avgSpeed, pw, mw);
  renderRanking(avgSpeed);

  document.getElementById('result-overlay').classList.remove('hidden');
}

function restartGame() {
  gameState.round = 1;
  gameState.playerScore = 0;
  gameState.monsterScore = 0;
  gameState.roundResults = [];
  gameState.roundSpeeds = [];
  gameState.comboCount = 0;
  gameState.maxCombo = 0;
  gameState.totalCharsTyped = 0;
  gameState.correctCharsTyped = 0;
  gameState.roundAccuracies = [];
  updateComboDisplay();
  document.getElementById('stat-accuracy').textContent = '-';
  document.getElementById('result-overlay').classList.add('hidden');
  renderMedals();
  startRound();
}
function quitToSetup() {
  if (gameState.monsterInterval) clearInterval(gameState.monsterInterval);
  if (gameState.monsterDelay) clearTimeout(gameState.monsterDelay);
  if (gameState.autoAdvanceTimer) clearTimeout(gameState.autoAdvanceTimer);
  document.getElementById('result-overlay').classList.add('hidden');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
}

// ─── 파티클 ───
function spawnParticles() {
  const colors = ['#a855f7','#60a5fa','#86efac','#fbbf24','#f472b6'];
  const cx = window.innerWidth / 2, cy = window.innerHeight * 0.65;
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.background = colors[i % colors.length];
    p.style.left = (cx + (Math.random()-0.5)*80) + 'px';
    p.style.top = cy + 'px';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 60 + Math.random() * 80;
    p.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist - 60 + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

// ─── 카운트다운 ───
function showCountdown(num) {
  const overlay = document.getElementById('countdown-overlay');
  const el = document.getElementById('countdown-number');
  overlay.classList.remove('hidden', 'fade-out');
  overlay.style.opacity = '';
  if (num > 0) {
    el.textContent = num;
    el.classList.remove('go');
  } else {
    el.textContent = cfg.lang === 'ko' ? '시작!' : 'GO!';
    el.classList.add('go');
  }
  el.classList.remove('pulse');
  void el.offsetWidth;
  el.classList.add('pulse');
}
function fadeOutCountdown(callback) {
  const overlay = document.getElementById('countdown-overlay');
  overlay.classList.add('fade-out');
  // transition 끝나면 완전 숨김 + 콜백
  setTimeout(() => {
    overlay.classList.add('hidden');
    overlay.classList.remove('fade-out');
    if (callback) callback();
  }, 400);
}
function hideCountdown() {
  const overlay = document.getElementById('countdown-overlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('fade-out');
}

// ─── 팝업 ───
function showPopup(msg) {
  const el = document.createElement('div');
  el.className = 'popup-msg';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

// ─── 랭킹 ───
function getRankingKey() {
  return `typingBattleRanking_${cfg.lang}_${cfg.mode}`;
}
function loadRankings() {
  try {
    const raw = localStorage.getItem(getRankingKey());
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function saveRanking(avgSpeed, playerWins, monsterWins) {
  const rankings = loadRankings();
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  // 라운드별 최고 기록도 저장
  const bestRound = Math.max(...gameState.roundSpeeds);
  rankings.push({
    avg: avgSpeed,
    best: bestRound,
    wins: playerWins,
    losses: monsterWins,
    rounds: cfg.totalRounds,
    date: dateStr,
    speeds: [...gameState.roundSpeeds],
  });
  // 평균 속도 기준 상위 10개만 유지
  rankings.sort((a,b) => b.avg - a.avg);
  const trimmed = rankings.slice(0, 10);
  try { localStorage.setItem(getRankingKey(), JSON.stringify(trimmed)); } catch(e) {}
}
function renderRanking(currentAvg) {
  const rankings = loadRankings();
  const section = document.getElementById('ranking-section');
  if (rankings.length === 0) { section.innerHTML = ''; return; }
  const modeLabel = cfg.mode === 'word' ? '단어' : '문장';
  const langLabel = cfg.lang === 'ko' ? '한글' : 'English';
  let html = `<div class="ranking-title">🏆 ${langLabel} ${modeLabel} 모드 TOP ${Math.min(rankings.length, 10)}</div>`;
  html += '<div class="ranking-list">';
  rankings.forEach((r, i) => {
    const isCurrent = r.avg === currentAvg && i === rankings.findIndex(x => x.avg === currentAvg);
    const posClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const resultColor = r.wins > r.losses ? '#86efac' : r.wins === r.losses ? '#94a3b8' : '#f87171';
    html += `<div class="ranking-row ${isCurrent?'current':''}">
      <span class="rk-pos ${posClass}">${i+1}</span>
      <span class="rk-speed">${r.avg} 타/분</span>
      <span class="rk-date">${r.date}</span>
      <span class="rk-result" style="color:${resultColor}">${r.wins}W ${r.losses}L</span>
    </div>`;
  });
  html += '</div>';
  section.innerHTML = html;
}

// ─── 설정 저장/로드 ───
function saveSettings() {
  if (_loadingSettings) return;
  const data = {
    lang: cfg.lang,
    mode: cfg.mode,
    mySpeed: cfg.mySpeed,
    diff: cfg.diff,
    totalRounds: cfg.totalRounds,
  };
  try { localStorage.setItem('typingBattleSettings', JSON.stringify(data)); } catch(e) {}
}
let _loadingSettings = false;
function loadSettings() {
  try {
    const raw = localStorage.getItem('typingBattleSettings');
    if (!raw) return;
    const data = JSON.parse(raw);
    _loadingSettings = true; // 로딩 중에는 saveSettings 방지
    if (data.lang) selectLang(data.lang);
    if (data.mode) selectMode(data.mode);
    if (data.diff) selectDiff(data.diff);
    if (data.totalRounds) selectRounds(data.totalRounds);
    if (data.mySpeed) {
      cfg.mySpeed = data.mySpeed;
      document.getElementById('speed-input').value = data.mySpeed;
    }
    _loadingSettings = false;
  } catch(e) { _loadingSettings = false; }
}

// 설정 변경 시 자동 저장
const _origSelectLang = selectLang;
selectLang = function(l) { _origSelectLang(l); saveSettings(); };
const _origSelectMode = selectMode;
selectMode = function(m) { _origSelectMode(m); saveSettings(); };
const _origSelectDiff = selectDiff;
selectDiff = function(d) { _origSelectDiff(d); saveSettings(); };
const _origSelectRounds = selectRounds;
selectRounds = function(r) { _origSelectRounds(r); saveSettings(); };

// ─── 초기화 ───
setupBgDeco();
loadSettings();
</script>
