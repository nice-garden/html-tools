<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 선택</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #0d0d1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(ellipse at 20% 30%, rgba(68,255,68,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(100,120,255,0.09) 0%, transparent 50%);
    pointer-events: none;
}

h1 {
    font-size: clamp(22px, 5vw, 38px);
    font-weight: bold;
    color: #e0e0e0;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-align: center;
}

.subtitle {
    font-size: clamp(12px, 2.5vw, 16px);
    color: #555;
    margin-bottom: 48px;
    text-align: center;
    letter-spacing: 1px;
}

.cards {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 20px;
}

.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: clamp(180px, 40vw, 260px);
    aspect-ratio: 3/4;
    border-radius: 24px;
    border: 2px solid transparent;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    padding: 32px 20px;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: inherit;
}

.card:hover { transform: translateY(-6px); }
.card:hover::before { opacity: 1; }

.card-math {
    background: linear-gradient(145deg, #0f1f0f, #1a2e1a);
    border-color: #2a5a2a;
}
.card-math:hover {
    box-shadow: 0 12px 40px rgba(68,255,68,0.25);
    border-color: #44ff44;
}
.card-math::before {
    background: radial-gradient(circle at 50% 0%, rgba(68,255,68,0.08), transparent 70%);
}

.card-taja {
    background: linear-gradient(145deg, #0f0f2a, #1a1a3e);
    border-color: #2a2a6a;
}
.card-taja:hover {
    box-shadow: 0 12px 40px rgba(100,120,255,0.3);
    border-color: #6478ff;
}
.card-taja::before {
    background: radial-gradient(circle at 50% 0%, rgba(100,120,255,0.1), transparent 70%);
}

.card-icon {
    font-size: clamp(48px, 10vw, 72px);
    margin-bottom: 18px;
}

.card-title {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: bold;
    margin-bottom: 8px;
    text-align: center;
}

.card-math .card-title { color: #44ff44; }
.card-taja .card-title { color: #8899ff; }

.card-desc {
    font-size: clamp(11px, 2.5vw, 14px);
    color: #888;
    text-align: center;
    line-height: 1.5;
}

.badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: bold;
    letter-spacing: 0.5px;
}
.card-math .badge { background: rgba(68,255,68,0.15); color: #44ff44; border: 1px solid #44ff4440; }
.card-taja .badge { background: rgba(100,120,255,0.15); color: #8899ff; border: 1px solid #6478ff40; }

.card-math-plus {
    background: linear-gradient(145deg, #1a1f0a, #2a3a0a);
    border-color: #4a7a10;
}
.card-math-plus:hover {
    box-shadow: 0 12px 40px rgba(120,255,50,0.3);
    border-color: #aaff44;
}
.card-math-plus::before {
    background: radial-gradient(circle at 50% 0%, rgba(120,255,50,0.1), transparent 70%);
}
.card-math-plus .card-title { color: #aaff44; }
.card-math-plus .badge { background: rgba(120,255,50,0.15); color: #aaff44; border: 1px solid #aaff4440; }

.card-taja-plus {
    background: linear-gradient(145deg, #15082a, #28105a);
    border-color: #5a30aa;
}
.card-taja-plus:hover {
    box-shadow: 0 12px 40px rgba(180,100,255,0.35);
    border-color: #c070ff;
}
.card-taja-plus::before {
    background: radial-gradient(circle at 50% 0%, rgba(180,100,255,0.12), transparent 70%);
}
.card-taja-plus .card-title { color: #c070ff; }
.card-taja-plus .badge { background: rgba(180,100,255,0.15); color: #c070ff; border: 1px solid #c070ff40; }
</style>
</head>
<body>

<h1>🎮 게임 선택</h1>
<p class="subtitle">플레이할 게임을 선택하세요</p>

<div class="cards">
    <a class="card card-math" href="math.html">
        <span class="badge">MATH</span>
        <div class="card-icon">🧮</div>
        <div class="card-title">슬라임 수학대전</div>
        <div class="card-desc">몰려오는 몬스터를<br>수학 문제로 처치하라!</div>
    </a>

    <a class="card card-taja" href="taja.html">
        <span class="badge">TYPING</span>
        <div class="card-icon">⌨️</div>
        <div class="card-title">타자 배틀</div>
        <div class="card-desc">날아오는 단어를<br>빠르게 타이핑하라!</div>
    </a>

    <a class="card card-math-plus" href="math_1.html">
        <span class="badge">MATH +</span>
        <div class="card-icon">🧮✨</div>
        <div class="card-title">슬라임 수학대전 +</div>
        <div class="card-desc">콤보·효과음·일시정지<br>강화된 개선판!</div>
    </a>

    <a class="card card-taja-plus" href="taja_1.html">
        <span class="badge">TYPING +</span>
        <div class="card-icon">⌨️✨</div>
        <div class="card-title">타자 배틀 +</div>
        <div class="card-desc">콤보·효과음·정확도<br>강화된 개선판!</div>
    </a>
</div>

</body>
</html>
